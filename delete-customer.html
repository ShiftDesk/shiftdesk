<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Delete Customer from Firebase</title>
<style>
body{font-family:sans-serif;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
.box{background:#fff;border-radius:16px;padding:36px 32px;width:500px;box-shadow:0 8px 40px rgba(0,0,0,.12);}
h2{margin:0 0 8px;font-size:1.2rem;}
p{color:#666;font-size:.85rem;margin:0 0 20px;line-height:1.5;}
button{background:#1b6e40;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:.9rem;font-weight:700;cursor:pointer;margin-right:8px;margin-bottom:8px;}
button.red{background:#c0392b;}
button:disabled{opacity:.5;}
#log{font-size:.82rem;line-height:2;margin-top:16px;}
.ok{color:#1b6e40;font-weight:700;}
.err{color:#c0392b;font-weight:700;}
.info{color:#555;}
.cust{background:#f5f5f5;border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
</style>
</head>
<body>
<div class="box">
  <h2>🗑 Manage Firebase Customers</h2>
  <p>This shows all customers in Firebase and lets you delete any that shouldn't exist.</p>
  <button onclick="loadAll()">Load All Customers →</button>
  <div id="log"></div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const cfg = {
  apiKey: "AIzaSyA-LRHC7d0DkjArQBkivoV4EwW5iV5vX6M",
  authDomain: "shiftdesk-admin.firebaseapp.com",
  projectId: "shiftdesk-admin",
  storageBucket: "shiftdesk-admin.firebasestorage.app",
  messagingSenderId: "942500137972",
  appId: "1:942500137972:web:c0e0755c97f3590bcb07a1"
};

let db;

window.loadAll = async function() {
  const log = document.getElementById('log');
  log.innerHTML = '<span class="info">Loading...</span>';
  try {
    const app = getApps().length ? getApps()[0] : initializeApp(cfg);
    db = getFirestore(app);
    const snap = await getDocs(collection(db, "customers"));
    if (snap.docs.length === 0) {
      log.innerHTML = '<span class="info">No customers found in Firebase.</span>';
      return;
    }
    log.innerHTML = '<span class="info">Found ' + snap.docs.length + ' customer(s):</span><br><br>';
    snap.docs.forEach(function(d) {
      const data = d.data();
      const div = document.createElement('div');
      div.className = 'cust';
      div.innerHTML = '<div><strong>' + (data.name||'?') + '</strong><br><span style="font-size:.75rem;color:#666;">' + (data.email||'no email') + ' · ' + (data.status||'?') + '</span></div>'
        + '<button class="red" onclick="deleteCust(\'' + d.id + '\', \'' + (data.name||'?') + '\', this)">Delete</button>';
      log.appendChild(div);
    });
  } catch(e) {
    log.innerHTML = '<span class="err">Error: ' + e.message + '</span>';
  }
};

window.deleteCust = async function(id, name, btn) {
  if (!confirm('Delete "' + name + '" from Firebase? Cannot be undone.')) return;
  btn.disabled = true;
  btn.textContent = 'Deleting...';
  try {
    await deleteDoc(doc(db, "customers", id));
    btn.parentElement.innerHTML = '<span class="ok">✓ Deleted: ' + name + '</span>';
  } catch(e) {
    btn.textContent = 'Error!';
    alert('Error: ' + e.message);
  }
};
</script>
</body>
</html>
