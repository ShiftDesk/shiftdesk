<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ShiftDesk — Firebase Reset</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f2f0ec;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;}
.box{background:#fff;border-radius:18px;padding:36px 32px;width:560px;max-width:100%;box-shadow:0 8px 48px rgba(0,0,0,.13);border:1.5px solid #e8e4dd;}
h2{font-size:1.2rem;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:9px;}
.subtitle{color:#666;font-size:.85rem;margin-bottom:24px;line-height:1.7;}

/* What gets deleted */
.col-list{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px;}
.col-item{background:#fdecea;border:1.5px solid #f5a89a;border-radius:9px;padding:10px 12px;font-size:.78rem;}
.col-name{font-family:'Courier New',monospace;font-weight:700;color:#c0392b;margin-bottom:2px;}
.col-desc{color:#888;font-size:.72rem;}

/* Confirm input */
.confirm-section{background:#fff8f0;border:2px solid #e67e22;border-radius:12px;padding:16px 18px;margin-bottom:18px;display:none;}
.confirm-section p{font-size:.84rem;color:#7a3d00;margin-bottom:12px;line-height:1.5;}
.confirm-lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:#7a3d00;font-weight:700;display:block;margin-bottom:6px;}
.confirm-input{width:100%;background:#fff;border:2px solid #e67e22;color:#333;border-radius:8px;padding:10px 12px;font-family:'Courier New',monospace;font-size:.9rem;outline:none;margin-bottom:12px;transition:border-color .15s;}
.confirm-input:focus{border-color:#c0392b;}
.confirm-row{display:flex;gap:8px;}

/* Buttons */
.btn{border:none;border-radius:9px;padding:11px 18px;font-size:.88rem;font-weight:700;cursor:pointer;flex:1;transition:all .15s;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-scan{width:100%;background:#c0392b;color:#fff;margin-bottom:0;}
.btn-scan:hover:not(:disabled){background:#a53125;}
.btn-delete{background:#c0392b;color:#fff;}
.btn-delete:hover:not(:disabled){background:#a53125;}
.btn-cancel{background:#f0ede7;color:#333;}
.btn-cancel:hover:not(:disabled){background:#e3ddd4;}

/* Progress */
#progressWrap{display:none;margin-top:14px;}
#progressBg{background:#e3ddd4;border-radius:3px;overflow:hidden;}
#progressBar{height:6px;border-radius:3px;background:#c0392b;width:0%;transition:width .25s;}
#progressLabel{font-size:.72rem;color:#888;margin-top:5px;text-align:right;}

/* Log */
#logWrap{display:none;margin-top:16px;}
#log{font-size:.78rem;line-height:2;max-height:320px;overflow-y:auto;background:#f7f5f1;border:1.5px solid #e3ddd4;border-radius:10px;padding:10px 14px;}
.ok{color:#1b6e40;font-weight:700;}
.err{color:#c0392b;font-weight:700;}
.info{color:#555;}
.warn{color:#b45309;font-weight:600;}
.summary{margin-top:10px;padding:11px 14px;background:#e4f2ec;border:1.5px solid #a8d5bc;border-radius:9px;font-size:.83rem;color:#1b6e40;font-weight:700;line-height:1.7;}
.summary-err{background:#fdecea;border-color:#f5a89a;color:#c0392b;}
</style>
</head>
<body>
<div class="box">
  <h2>🔥 Full Firebase Reset</h2>
  <p class="subtitle">
    Deletes <strong>everything</strong> in Firebase and starts completely fresh.<br>
    Use this before entering new real customer data.
  </p>

  <div class="col-list">
    <div class="col-item">
      <div class="col-name">customers</div>
      <div class="col-desc">All customer accounts</div>
    </div>
    <div class="col-item">
      <div class="col-name">customerData</div>
      <div class="col-desc">All shifts, staff, schedules</div>
    </div>
    <div class="col-item">
      <div class="col-name">appSettings</div>
      <div class="col-desc">Admin password</div>
    </div>
    <div class="col-item">
      <div class="col-name">passwordResets</div>
      <div class="col-desc">All reset requests</div>
    </div>
  </div>

  <button class="btn btn-scan" id="btnScan">🔍 Scan — Show What Will Be Deleted →</button>

  <div class="confirm-section" id="confirmSection">
    <p id="confirmText"></p>
    <label class="confirm-lbl">Type <strong>DELETE ALL</strong> to confirm</label>
    <input class="confirm-input" type="text" id="confirmInput" placeholder="DELETE ALL" autocomplete="off" spellcheck="false">
    <div class="confirm-row">
      <button class="btn btn-cancel" id="btnCancel">Cancel</button>
      <button class="btn btn-delete" id="btnDelete" disabled>🔥 Yes, Delete Everything →</button>
    </div>
  </div>

  <div id="progressWrap">
    <div id="progressBg"><div id="progressBar"></div></div>
    <div id="progressLabel">0 / 0</div>
  </div>

  <div id="logWrap"><div id="log"></div></div>
</div>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, getDocs, deleteDoc, doc }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ── Firebase config ──────────────────────────────────────────────────────
const CFG = {
  apiKey:            'AIzaSyA-LRHC7d0DkjArQBkivoV4EwW5iV5vX6M',
  authDomain:        'shiftdesk-admin.firebaseapp.com',
  projectId:         'shiftdesk-admin',
  storageBucket:     'shiftdesk-admin.firebasestorage.app',
  messagingSenderId: '942500137972',
  appId:             '1:942500137972:web:c0e0755c97f3590bcb07a1'
};

// ── Collections to wipe ──────────────────────────────────────────────────
const COLLECTIONS = ['customers', 'customerData', 'appSettings', 'passwordResets'];

// ── DOM ──────────────────────────────────────────────────────────────────
const btnScan       = document.getElementById('btnScan');
const btnDelete     = document.getElementById('btnDelete');
const btnCancel     = document.getElementById('btnCancel');
const confirmSect   = document.getElementById('confirmSection');
const confirmTxt    = document.getElementById('confirmText');
const confirmInput  = document.getElementById('confirmInput');
const logWrap       = document.getElementById('logWrap');
const logEl         = document.getElementById('log');
const progressWrap  = document.getElementById('progressWrap');
const progressBar   = document.getElementById('progressBar');
const progressLabel = document.getElementById('progressLabel');

function addLog(cls, msg) {
  logWrap.style.display = 'block';
  logEl.innerHTML += '<div class="' + cls + '">' + msg + '</div>';
  logEl.scrollTop = logEl.scrollHeight;
}
function clearLog() { logEl.innerHTML = ''; }

function getDB() {
  const app = getApps().length ? getApps()[0] : initializeApp(CFG);
  return getFirestore(app);
}

// ── Confirm input watcher ────────────────────────────────────────────────
confirmInput.addEventListener('input', function() {
  btnDelete.disabled = confirmInput.value.trim() !== 'DELETE ALL';
});

// ── STEP 1 — Scan ────────────────────────────────────────────────────────
let allDocs = []; // [{col, id}]

btnScan.addEventListener('click', async () => {
  btnScan.disabled = true;
  btnScan.textContent = 'Scanning…';
  confirmSect.style.display   = 'none';
  progressWrap.style.display  = 'none';
  confirmInput.value          = '';
  btnDelete.disabled          = true;
  clearLog();
  allDocs = [];

  try {
    const db = getDB();
    addLog('info', '📡 Connected to Firebase.');

    let totalDocs = 0;
    const counts = {};

    for (const colName of COLLECTIONS) {
      const snap = await getDocs(collection(db, colName));
      counts[colName] = snap.docs.length;
      totalDocs += snap.docs.length;
      for (const docSnap of snap.docs) {
        allDocs.push({ col: colName, id: docSnap.id });
      }
      if (snap.docs.length > 0) {
        addLog('warn', '🗂 <strong>' + colName + '</strong>: ' + snap.docs.length + ' document(s) found');
      } else {
        addLog('info', '✅ <strong>' + colName + '</strong>: already empty');
      }
    }

    if (totalDocs === 0) {
      addLog('ok', '<br>✅ Firebase is already completely empty — nothing to delete!');
      btnScan.textContent = '✅ Already Empty';
      btnScan.disabled = false;
      return;
    }

    confirmTxt.innerHTML =
      'Found <strong>' + totalDocs + ' document(s)</strong> across all collections:<br>' +
      COLLECTIONS.map(c => counts[c] > 0
        ? '&nbsp;&nbsp;• <code>' + c + '</code>: <strong>' + counts[c] + '</strong>'
        : '&nbsp;&nbsp;• <code>' + c + '</code>: empty'
      ).join('<br>') +
      '<br><br>This <strong>cannot be undone</strong>. Type DELETE ALL below to confirm.';

    confirmSect.style.display = 'block';
    btnScan.textContent = '🔍 Re-Scan';
    btnScan.disabled = false;
    setTimeout(() => confirmInput.focus(), 100);

  } catch(err) {
    addLog('err', '❌ Scan error: ' + err.message);
    btnScan.textContent = '🔍 Retry Scan';
    btnScan.disabled = false;
  }
});

// ── Cancel ────────────────────────────────────────────────────────────────
btnCancel.addEventListener('click', () => {
  confirmSect.style.display = 'none';
  confirmInput.value = '';
  btnDelete.disabled = true;
  allDocs = [];
  addLog('info', '🚫 Cancelled — nothing was deleted.');
});

// ── STEP 2 — Delete All ───────────────────────────────────────────────────
btnDelete.addEventListener('click', async () => {
  if (confirmInput.value.trim() !== 'DELETE ALL') return;
  if (!allDocs.length) return;

  btnDelete.disabled  = true;
  btnCancel.disabled  = true;
  btnScan.disabled    = true;
  confirmSect.style.display  = 'none';
  progressWrap.style.display = 'block';
  progressBar.style.width    = '0%';

  clearLog();
  addLog('info', '🔥 Deleting <strong>' + allDocs.length + '</strong> documents…');

  const db    = getDB();
  let deleted = 0;
  let failed  = 0;
  const total = allDocs.length;

  for (const item of allDocs) {
    try {
      await deleteDoc(doc(db, item.col, item.id));
      deleted++;
      addLog('ok', '✓ Deleted <code>' + item.col + ' / ' + item.id + '</code>');
    } catch(err) {
      failed++;
      addLog('err', '✗ Failed: <code>' + item.col + ' / ' + item.id + '</code> — ' + err.message);
    }
    const pct = Math.round(((deleted + failed) / total) * 100);
    progressBar.style.width   = pct + '%';
    progressLabel.textContent = (deleted + failed) + ' / ' + total;
  }

  // Also clear admin password from localStorage so admin.html resets to default
  try { localStorage.removeItem('shiftdesk_admin_pw'); } catch(e) {}
  try { localStorage.removeItem('sd_adm_attempts'); } catch(e) {}
  try { localStorage.removeItem('sd_adm_lockout'); } catch(e) {}

  const clean = failed === 0;
  logEl.innerHTML += '<div class="summary' + (clean ? '' : ' summary-err') + '">' +
    (clean
      ? '✅ Done! Deleted <strong>' + deleted + '</strong> documents.<br>' +
        '🔑 Admin password reset to default: <strong>Admin2025</strong><br>' +
        '🚀 Firebase is now completely fresh — you can add new customers.'
      : '⚠️ Finished with errors: <strong>' + deleted + '</strong> deleted, <strong>' + failed + '</strong> failed.')
    + '</div>';
  logEl.scrollTop = logEl.scrollHeight;

  btnScan.textContent = '🔍 Re-Scan';
  btnScan.disabled    = false;
  btnCancel.disabled  = false;
  allDocs = [];
});
</script>
</body>
</html>
