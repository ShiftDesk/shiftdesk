<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ShiftDesk — Cleanup</title>
<style>
body{font-family:sans-serif;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
.box{background:#fff;border-radius:16px;padding:36px 32px;width:480px;box-shadow:0 8px 40px rgba(0,0,0,.12);}
h2{margin:0 0 8px;font-size:1.2rem;}
p{color:#666;font-size:.85rem;margin:0 0 20px;line-height:1.5;}
button{width:100%;background:#c0392b;color:#fff;border:none;border-radius:10px;padding:13px;font-size:.95rem;font-weight:700;cursor:pointer;margin-bottom:10px;}
button:disabled{opacity:.5;cursor:not-allowed;}
#log{font-size:.8rem;line-height:2;min-height:20px;margin-top:10px;}
.ok{color:#1b6e40;font-weight:700;}
.err{color:#c0392b;}
.info{color:#555;}
</style>
</head>
<body>
<div class="box">
  <h2>🗑 Delete All Payroll Data from Firebase</h2>
  <p>This deletes <strong>loen.html</strong> and <strong>payroll.html</strong> customer data from Firebase. Your customers and staff scheduling data will NOT be deleted.</p>
  <button id="btn" onclick="run()">Delete All Payroll Data →</button>
  <div id="log"></div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const cfg = {
  apiKey: "AIzaSyA-LRHC7d0DkjArQBkivoV4EwW5iV5vX6M",
  authDomain: "shiftdesk-admin.firebaseapp.com",
  projectId: "shiftdesk-admin",
  storageBucket: "shiftdesk-admin.firebasestorage.app",
  messagingSenderId: "942500137972",
  appId: "1:942500137972:web:c0e0755c97f3590bcb07a1"
};

window.run = async function() {
  var log = document.getElementById('log');
  var btn = document.getElementById('btn');
  btn.disabled = true;
  log.innerHTML = '<span class="info">Connecting...</span>';

  try {
    const app = getApps().length ? getApps()[0] : initializeApp(cfg);
    const db = getFirestore(app);

    log.innerHTML += '<br><span class="info">Loading customerData collection...</span>';
    const snap = await getDocs(collection(db, "customerData"));
    log.innerHTML += '<br><span class="info">Found ' + snap.docs.length + ' entries in customerData</span>';

    var deleted = 0;
    for (var d of snap.docs) {
      // Delete all cust_*_staff, cust_*_shifts, cust_*_monthStore etc
      // These are the keys loen.html/payroll.html used
      await deleteDoc(doc(db, "customerData", d.id));
      deleted++;
      log.innerHTML += '<br><span class="ok">✓ Deleted: ' + d.id + '</span>';
    }

    log.innerHTML += '<br><br><span class="ok">✅ Done! Deleted ' + deleted + ' entries.</span>';
    log.innerHTML += '<br><span class="info">Your customers and admin data are untouched.</span>';
    log.innerHTML += '<br><span class="info">You can now delete loen.html and payroll.html from GitHub.</span>';

  } catch(e) {
    log.innerHTML += '<br><span class="err">Error: ' + e.message + '</span>';
    btn.disabled = false;
  }
};
</script>
</body>
</html>
