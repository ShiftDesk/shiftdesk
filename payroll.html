<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ShiftDesk — Payroll</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f5f1;--white:#fff;--s2:#f0ede7;--border:#e3ddd4;--b2:#c9c3b8;
  --text:#18160f;--muted:#8c8880;--acc:#bf4a0a;--acc-lt:#fdf0e8;
  --green:#1b6e40;--green-lt:#e4f2ec;--blue:#1b4896;--blue-lt:#e6edf9;
  --red:#c0392b;--red-lt:#fdf0f0;--shadow:0 4px 16px rgba(0,0,0,.11);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* TOPBAR */
.topbar{background:#fff;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:58px;position:sticky;top:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.logo{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--text);}
.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--acc);}
.pay-badge{background:var(--green-lt);color:var(--green);border:1px solid #a8d5bc;font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:20px;font-family:'DM Mono',monospace;}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--b2);color:var(--text);padding:6px 13px;border-radius:8px;font-size:.76rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all .13s;font-family:'DM Sans',sans-serif;}
.back-btn:hover{background:var(--text);color:#fff;border-color:var(--text);}

/* LAYOUT */
.page{display:grid;grid-template-columns:280px 1fr;gap:0;height:calc(100vh - 58px);}
.sidebar{background:#fff;border-right:1.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.main{overflow-y:auto;background:var(--bg);padding:24px;}

/* SIDEBAR */
.sb-head{padding:16px 16px 12px;border-bottom:1px solid var(--border);}
.sb-title{font-family:'Fraunces',serif;font-size:1rem;font-weight:700;}
.sb-sub{font-size:.65rem;color:var(--muted);margin-top:2px;}
.sb-section{padding:10px 10px 4px;font-size:.59rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;}
.sb-body{flex:1;overflow-y:auto;padding:6px 8px;}
.staff-card{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;margin-bottom:3px;cursor:pointer;border:1.5px solid transparent;transition:all .13s;}
.staff-card:hover{background:var(--s2);border-color:var(--border);}
.staff-card.active{background:var(--acc-lt);border-color:var(--acc);}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.68rem;flex-shrink:0;border:1.5px solid rgba(0,0,0,.06);overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.sc-name{font-size:.8rem;font-weight:600;line-height:1.2;}
.sc-role{font-size:.59rem;color:var(--muted);font-family:'DM Mono',monospace;}
.sc-sal{font-size:.67rem;font-family:'DM Mono',monospace;color:var(--green);font-weight:600;margin-left:auto;white-space:nowrap;}

/* PERIOD PICKER */
.period-bar{padding:12px 10px 8px;border-top:1px solid var(--border);background:var(--s2);}
.period-lbl{font-size:.59rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700;margin-bottom:6px;}
.period-row{display:flex;gap:5px;margin-bottom:6px;}
.p-btn{flex:1;padding:5px 4px;border-radius:7px;border:1.5px solid var(--b2);background:#fff;font-family:'DM Sans',sans-serif;font-size:.67rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all .12s;text-align:center;}
.p-btn.active{background:var(--acc);color:#fff;border-color:var(--acc);}
.period-select{width:100%;background:#fff;border:1.5px solid var(--b2);border-radius:7px;padding:6px 8px;font-family:'DM Mono',monospace;font-size:.72rem;color:var(--text);outline:none;cursor:pointer;}

/* MAIN CONTENT */
.no-staff{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;color:var(--muted);text-align:center;}
.no-staff-icon{font-size:3rem;margin-bottom:12px;opacity:.4;}

/* SLIP HEADER */
.slip{background:#fff;border:1.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;}
.slip-topbar{background:var(--green);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.slip-company{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;}
.slip-title{font-size:.7rem;opacity:.8;margin-top:1px;}
.slip-period-badge{background:rgba(255,255,255,.2);border-radius:7px;padding:5px 12px;font-family:'DM Mono',monospace;font-size:.75rem;font-weight:600;}

.slip-meta{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1.5px solid var(--border);}
.slip-meta-col{padding:14px 18px;}
.slip-meta-col:first-child{border-right:1px solid var(--border);}
.meta-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.meta-row:last-child{margin-bottom:0;}
.meta-lbl{font-size:.67rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.meta-val{font-size:.75rem;font-family:'DM Mono',monospace;font-weight:600;}

/* SALARY TABLE */
.slip-table{width:100%;}
.slip-thead th{background:var(--s2);padding:9px 14px;text-align:left;font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;border-bottom:1.5px solid var(--border);}
.slip-thead th:not(:first-child){text-align:right;}
.slip-tbody td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:.8rem;vertical-align:middle;}
.slip-tbody td:not(:first-child){text-align:right;font-family:'DM Mono',monospace;}
.slip-tbody tr:last-child td{border-bottom:none;}
.slip-tbody tr:hover td{background:var(--s2);}
.row-positive td{color:var(--green);}
.row-negative td{color:var(--red);}
.row-neutral td{color:var(--muted);}
.row-section td{background:var(--s2);font-size:.6rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700;padding:6px 14px;}
.row-total td{background:var(--text);color:#fff;font-weight:700;}
.row-total td:first-child{font-family:'Fraunces',serif;font-size:.9rem;}
.row-total td:not(:first-child){font-family:'DM Mono',monospace;font-size:.95rem;}

/* BOTTOM SECTIONS */
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;border-top:1.5px solid var(--border);}
.bottom-col{padding:14px 18px;}
.bottom-col:first-child{border-right:1px solid var(--border);}
.bc-title{font-size:.62rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.bc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:.75rem;}
.bc-lbl{color:var(--muted);}
.bc-val{font-family:'DM Mono',monospace;font-weight:600;}

/* PAYOUT BOX */
.payout-box{margin:0 18px 18px;background:var(--green-lt);border:2px solid var(--green);border-radius:11px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
.payout-lbl{font-family:'Fraunces',serif;font-size:1rem;font-weight:700;color:var(--green);}
.payout-val{font-family:'DM Mono',monospace;font-size:1.6rem;font-weight:700;color:var(--green);}
.payout-sub{font-size:.65rem;color:var(--green);opacity:.7;margin-top:2px;}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.76rem;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;transition:all .14s;white-space:nowrap;}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow);}
.btn-acc{background:var(--acc);color:#fff;}
.btn-acc:hover{background:#9d3c07;}
.btn-ghost{background:#fff;border:1.5px solid var(--b2);color:var(--text);}
.btn-ghost:hover{border-color:var(--text);background:var(--text);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#145530;}

/* ACTION BAR */
.action-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
.action-bar-title{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:700;margin-right:auto;}

/* SETTINGS PANEL */
.settings-panel{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:16px;}
.sp-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700;margin-bottom:12px;}
.sp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.sp-field{display:flex;flex-direction:column;gap:4px;}
.sp-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;}
.sp-input{width:100%;background:var(--s2);border:1.5px solid var(--b2);color:var(--text);border-radius:7px;padding:7px 9px;font-family:'DM Mono',monospace;font-size:.8rem;outline:none;transition:border-color .13s;}
.sp-input:focus{border-color:var(--acc);background:#fff;}
.sp-toggle{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--s2);border:1.5px solid var(--border);border-radius:7px;cursor:pointer;transition:all .12s;}
.sp-toggle:hover{border-color:var(--acc);}
.sp-toggle.on{background:var(--green-lt);border-color:var(--green);}
.toggle-dot{width:14px;height:14px;border-radius:50%;background:var(--b2);transition:all .13s;flex-shrink:0;}
.sp-toggle.on .toggle-dot{background:var(--green);}
.sp-toggle-lbl{font-size:.7rem;font-weight:600;}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;z-index:900;background:var(--text);color:#fff;padding:10px 18px;border-radius:9px;font-size:.77rem;font-weight:500;box-shadow:var(--shadow);animation:fadeIn .18s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:12px;}

/* PRINT */
@media print{
  .topbar,.action-bar,.settings-panel,.sidebar,.period-bar,.back-btn,.print-hide{display:none!important;}
  .page{grid-template-columns:1fr;height:auto;}
  .main{padding:0;overflow:visible;}
  .slip{border:1px solid #ddd;border-radius:0;margin-bottom:12px;page-break-inside:avoid;}
  body{background:#fff;}
}

#payLogin{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;background:#f7f5f1!important;z-index:99999!important;display:flex!important;align-items:center!important;justify-content:center!important;}
.ply-box{background:#fff;border:1.5px solid #e3ddd4;border-radius:20px;padding:40px 36px;width:380px;max-width:calc(100vw - 32px);box-shadow:0 24px 80px rgba(0,0,0,.12);}
.ply-logo{display:flex;align-items:center;gap:9px;margin-bottom:4px;}
.ply-dot{width:11px;height:11px;border-radius:50%;background:#bf4a0a;}
.ply-brand{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;}
.ply-badge{background:#e4f2ec;color:#1b6e40;border-radius:20px;padding:2px 9px;font-size:.67rem;font-weight:700;}
.ply-sub{font-size:.76rem;color:#8c8880;margin-bottom:24px;}
.ply-fg{margin-bottom:12px;}
.ply-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.07em;color:#8c8880;display:block;margin-bottom:5px;font-weight:700;}
.ply-inp{width:100%;background:#f7f5f1;border:1.5px solid #c9c3b8;border-radius:9px;padding:10px 12px;font-family:'DM Mono',monospace;font-size:.84rem;outline:none;box-sizing:border-box;transition:border-color .15s;}
.ply-inp:focus{border-color:#1b6e40;background:#fff;}
.ply-btn{width:100%;background:#1b6e40;color:#fff;border:none;border-radius:10px;padding:12px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;margin-bottom:10px;}
.ply-btn:disabled{opacity:.5;cursor:not-allowed;}
.ply-err{font-size:.74rem;color:#c0392b;background:#fdf0f0;border:1px solid #f5c0c0;border-radius:8px;padding:8px 11px;margin-bottom:10px;display:none;}
@keyframes plyFade{to{opacity:0;transform:scale(.97)}}

</style>
</head>
<script>

</script>
<body>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, getDoc, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  try {
    const cfg = {
      apiKey: "AIzaSyA-LRHC7d0DkjArQBkivoV4EwW5iV5vX6M",
      authDomain: "shiftdesk-admin.firebaseapp.com",
      projectId: "shiftdesk-admin",
      storageBucket: "shiftdesk-admin.firebasestorage.app",
      messagingSenderId: "942500137972",
      appId: "1:942500137972:web:c0e0755c97f3590bcb07a1"
    };
    const app = initializeApp(cfg);
    const db  = getFirestore(app);
    window.fbGetData      = async function(k)   { try{ const d=await getDoc(doc(db,"customerData",k)); return d.exists()?d.data().value:null; }catch(e){return null;} };
    window.fbSetData      = async function(k,v)  { try{ await setDoc(doc(db,"customerData",k),{value:v}); }catch(e){} };
    // Retry up to 3 times with 1s delay — Firestore can return empty on first cold load
    window.fbGetCustomers = async function() {
      for (let attempt = 0; attempt < 3; attempt++) {
        try {
          const s = await getDocs(collection(db, "customers"));
          const results = s.docs.map(d => ({id: d.id, ...d.data()}));
          if (results.length > 0 || attempt === 2) return results;
          // Got empty on attempt 0 or 1 — wait and retry
          await new Promise(r => setTimeout(r, 1000));
        } catch(e) {
          if (attempt === 2) return [];
          await new Promise(r => setTimeout(r, 1000));
        }
      }
      return [];
    };
    window.fbReady = true;
  } catch(e) {
    console.error('Firebase init error:', e);
    window.fbReady = false;
  }
  window.dispatchEvent(new Event('fbReady'));
</script>
<script>
// ── DATA KEYS (match shiftdesk.html localStorage keys) ──────────────────
var KEYS = {
  staff:     'shiftdesk_staff',
  shifts:    'shiftdesk_shifts',
  monthStore:'shiftdesk_monthstore',
  pi:        'shiftdesk_pi',
  clockHist: 'shiftdesk_clockhistory',
  mgrPw:     'shiftdesk_mgr_pw',
};

// ── STATE ─────────────────────────────────────────────────────────────────
var staff = [];
var shifts = {};
var monthShiftsStore = {};
var personalInfo = {};
var clockHistory = {};
var MGR_PASSWORD = localStorage.getItem('shiftdesk_mgr_pw') || 'alex1900';
var selectedStaffId = null;
var periodMode = 'month'; // 'week' | 'month' | 'custom'
var customYear = new Date().getFullYear();
var customMonth = new Date().getMonth();

// Danish tax / deduction settings (editable per employee or globally)
// These are stored in localStorage per staff id
var defaultSettings = {
  amBidrag: 8,        // % AM tax
  pension:  4,        // % employee pension contribution
  pensionFirma: 8,    // % employer pension (PFA default 9%)
  atp:      99,       // DKK fixed per month (full-time)
  kosttillæg: 0,      // DKK per month
  drikkepenge: 0,     // DKK per month
  kostfradrag: 0,     // DKK per month (befordringsfradrag — enter per employee)
  personfradrag: 48900, // DKK per year → /12 per month
  trækprocent: 38,    // A-skat procent (Trækprocent)
  showAdvanced: false,
};

function loadSettings(sid) {
  var cfg = Object.assign({}, defaultSettings);
  try { var raw=localStorage.getItem('sd_pay_settings_'+sid); if(raw) cfg=Object.assign(cfg,JSON.parse(raw)); } catch(e){}
  // Merge company info
  try { var co=localStorage.getItem('sd_pay_company'); if(co) cfg=Object.assign(cfg,JSON.parse(co)); } catch(e){}
  return cfg;
}
function saveSettings(sid, cfg) {
  try { localStorage.setItem('sd_pay_settings_' + sid, JSON.stringify(cfg)); } catch(e){}
}

// ── UTILS ─────────────────────────────────────────────────────────────────
var MN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var MNS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var DN = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function getMonday(d){var c=new Date(d),day=c.getDay(),diff=c.getDate()-day+(day===0?-6:1);c.setDate(diff);c.setHours(0,0,0,0);return c;}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtDate(d){return d.getDate()+'. '+MNS[d.getMonth()]+' '+d.getFullYear();}
function fmtS(d){return d.getDate()+'. '+MNS[d.getMonth()];}
function ini(n){return n.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();}
function tdiff(s,e){var sh=parseInt(s),sm=parseInt(s.split(':')[1]),eh=parseInt(e),em=parseInt(e.split(':')[1]);if(eh<sh)eh+=24;return((eh*60+em)-(sh*60+sm))/60;}
function brkMin(sh){if(!sh.breakStart||!sh.breakEnd)return 0;return Math.round(tdiff(sh.breakStart,sh.breakEnd)*60);}
function workedH(sh){if(!sh.end||sh.end===sh.start)return 0;return Math.max(0,tdiff(sh.start,sh.end)-brkMin(sh)/60);}
function fmtDur(mins) {
  if (!mins && mins !== 0) return '—';
  var h = Math.floor(Math.abs(mins) / 60);
  var m = Math.abs(mins) % 60;
  if (h && m) return h + 'h ' + m + 'min';
  if (h) return h + 'h';
  return m + ' min';
}
function minsFromHHMM(t){if(!t)return 0;var p=t.split(':').map(Number);return p[0]*60+(p[1]||0);}
function fmtDKK(n){return Math.round(n).toLocaleString('da-DK')+' kr';}
function fmtDKKraw(n){return Math.round(n).toLocaleString('da-DK');}
function toast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},2500);}

var ROLES = {
  Manager:  {color:'#bf4a0a',bg:'#fdf0e8'},
  Floor:    {color:'#1b4896',bg:'#e6edf9'},
  Kitchen:  {color:'#1b6e40',bg:'#e4f2ec'},
  Bar:      {color:'#5e2fa0',bg:'#ece5f8'},
  Host:     {color:'#8c6200',bg:'#fff3c0'},
};
function rc(role){return ROLES[role]||{color:'#8c8880',bg:'#f0ede7'};}

// ── LOAD DATA from localStorage (shared with shiftdesk.html) ─────────────
function loadData() {
  try {
    MGR_PASSWORD = localStorage.getItem(KEYS.mgrPw) || 'alex1900';
    var s = localStorage.getItem(KEYS.staff);
    if (s) staff = JSON.parse(s);
    var sh = localStorage.getItem(KEYS.shifts);
    if (sh) { var p=JSON.parse(sh); shifts={}; Object.keys(p).forEach(function(k){shifts[parseInt(k)]=p[k];}); }
    var ms = localStorage.getItem(KEYS.monthStore);
    if (ms) { var p2=JSON.parse(ms); monthShiftsStore={}; Object.keys(p2).forEach(function(k){monthShiftsStore[parseInt(k)]=p2[k];}); }
    var pi = localStorage.getItem(KEYS.pi);
    if (pi) { try { var pip=JSON.parse(pi); personalInfo={}; Object.keys(pip).forEach(function(k){personalInfo[parseInt(k)]=pip[k];}); } catch(e){} }
    var ch = localStorage.getItem(KEYS.clockHist);
    if (ch) { var cho=JSON.parse(ch); clockHistory={}; Object.keys(cho).forEach(function(k){clockHistory[parseInt(k)]=cho[k];}); }
  } catch(e) { console.warn('loadData error', e); }
}

// ── MONTH PICKER ──────────────────────────────────────────────────────────
function populateMonthPicker() {
  var sel = document.getElementById('monthSelect');
  sel.innerHTML = '';
  var now = new Date();
  for (var y = now.getFullYear() - 2; y <= now.getFullYear() + 5; y++) {
    for (var m = 0; m < 12; m++) {
      var opt = document.createElement('option');
      opt.value = y + '-' + m;
      opt.textContent = MN[m] + ' ' + y;
      if (y === customYear && m === customMonth) opt.selected = true;
      sel.appendChild(opt);
    }
  }
}

function setPeriod(mode) {
  periodMode = mode;
  ['week','month','custom'].forEach(function(m) {
    document.getElementById('pb'+m.charAt(0).toUpperCase()+m.slice(1)).classList.toggle('active', m === mode);
  });
  document.getElementById('monthSelect').style.display = mode === 'custom' ? 'block' : 'none';
  renderPayslip();
}

function getRange() {
  if (periodMode === 'week') {
    var ws = getMonday(new Date());
    return { first: ws, last: addDays(ws, 6), label: fmtS(ws) + ' – ' + fmtS(addDays(ws, 6)) + ' ' + ws.getFullYear(), isWeek: true };
  }
  var y, m;
  if (periodMode === 'custom') {
    var sel = document.getElementById('monthSelect');
    var parts = sel.value ? sel.value.split('-') : [customYear, customMonth];
    y = parseInt(parts[0]); m = parseInt(parts[1]);
    customYear = y; customMonth = m;
  } else {
    var now = new Date(); y = now.getFullYear(); m = now.getMonth();
  }
  return { first: new Date(y, m, 1), last: new Date(y, m+1, 0), label: MN[m] + ' ' + y, isWeek: false, year: y, month: m };
}

function getShiftsForPeriod(sid) {
  var range = getRange();
  var result = [];
  for (var d = new Date(range.first); d <= range.last; d.setDate(d.getDate()+1)) {
    var dayIdx = (d.getDay()+6)%7;
    var dateStr = d.toISOString().slice(0,10);
    var ds;
    if (range.isWeek) {
      ds = (shifts[sid] || {})[dayIdx] || [];
    } else {
      var monKey = getMonday(new Date(d)).toISOString().slice(0, 10);
      var stored = monthShiftsStore[sid] && monthShiftsStore[sid][monKey];
      ds = (stored && stored[dayIdx]) || [];
    }
    var ce = clockHistory[sid] && clockHistory[sid][dateStr];
    if (ds.length === 0 && !ce) continue;
    if (ds.length > 0) {
      ds.forEach(function(sh) {
        var cs2='no_record', ah=0, ab=brkMin(sh);
        if(ce&&ce.inTime&&ce.outTime){
          cs2=ce.approved?'approved':'pending';
          // Raw clock hours (in to out)
          var rawH=Math.max(0,(minsFromHHMM(ce.outTime)-minsFromHHMM(ce.inTime))/60);
          // Subtract the scheduled break (same break as the shift definition)
          ah=Math.max(0,Math.round((rawH - ab/60)*100)/100);
        } else if(ce&&ce.inTime&&!ce.outTime){ cs2='checkedin'; }
        result.push({date:new Date(d),dayIdx:dayIdx,dateStr:dateStr,sh:sh,
          clockStatus:cs2,clockEntry:ce||null,
          wh:cs2==='approved'?ah:0, bm:cs2==='approved'?ab:0,
          schedH:Math.round(workedH(sh)*100)/100, actualH:ah});
      });
    } else if(ce&&ce.inTime&&ce.outTime) {
      // For unscheduled entries there's no defined break, so use raw hours
      var ah2=Math.max(0,Math.round((minsFromHHMM(ce.outTime)-minsFromHHMM(ce.inTime))/60*100)/100);
      result.push({date:new Date(d),dayIdx:dayIdx,dateStr:dateStr,
        sh:{start:ce.inTime,end:ce.outTime,note:ce.note||'Unscheduled'},
        clockStatus:ce.approved?'approved':'pending',clockEntry:ce,
        wh:ce.approved?ah2:0, bm:0, schedH:0, actualH:ah2});
    }
  }
  return result;
}

// ── RENDER SIDEBAR ────────────────────────────────────────────────────────
function renderSidebar() {
  var range = getRange();
  document.getElementById('sbSub').textContent = range.label;
  if (!staff.length) {
    document.getElementById('staffList').innerHTML = '<div class="empty"><div class="empty-icon">&#128100;</div><div style="font-size:.78rem;">No employees found.<br>Sign in with your ShiftDesk credentials.</div></div>';
    return;
  }
  var html = '';
  var seenRoles = [];
  staff.forEach(function(s){ if(s.role && seenRoles.indexOf(s.role)===-1) seenRoles.push(s.role); });
  var roleOrder=['Manager','Owner','Floor','Kitchen','Bar','Host','Service','Staff','Waiter','Chef'];
  seenRoles.sort(function(a,b){var ai=roleOrder.indexOf(a),bi=roleOrder.indexOf(b);if(ai===-1)ai=999;if(bi===-1)bi=999;return ai!==bi?ai-bi:a.localeCompare(b);});
  seenRoles.forEach(function(role) {
    var mem = staff.filter(function(s){ return s.role === role; });
    if (!mem.length) return;
    html += '<div class="sb-section">' + role.toUpperCase() + '</div>';
    mem.forEach(function(s) {
      var r = rc(s.role);
      var shiftList = getShiftsForPeriod(s.id);
      var totalH = 0; shiftList.forEach(function(x){ totalH += x.wh; });
      totalH = Math.round(totalH*10)/10;
      var salary = s.rate > 0 ? Math.round(totalH * s.rate) : null;
      var av = s.photo ? '<img src="'+s.photo+'" alt="">' : ini(s.name);
      html += '<div class="staff-card'+(s.id===selectedStaffId?' active':'')+'" onclick="selectStaff('+s.id+')">'
        + '<div class="av" style="background:'+r.bg+';color:'+r.color+';">'+av+'</div>'
        + '<div style="flex:1;min-width:0;">'
        + '<div class="sc-name">'+s.name+'</div>'
        + '<div class="sc-role">'+totalH+'t'+(s.rate?' · '+s.rate+' kr/t':'')+'</div>'
        + '</div>'
        + (salary !== null ? '<div class="sc-sal">'+salary.toLocaleString('da-DK')+' kr</div>' : '')
        + '</div>';
    });
  });
  document.getElementById('staffList').innerHTML = html;
}

function selectStaff(id) {
  selectedStaffId = id;
  renderSidebar();
  renderPayslip();
}

function renderPayslip() {

  if (selectedStaffId === null) return;
  // Capture typed values before re-render
  var _spVals = {};
  ['sp_rate','sp_companyName','sp_companyCvr','sp_companyPhone','sp_companyAddress',
   'sp_amBidrag','sp_trækprocent','sp_pension','sp_pensionFirma',
   'sp_atp','sp_kosttillæg','sp_drikkepenge','sp_kostfradrag','sp_personfradrag'].forEach(function(id){
    var el = document.getElementById(id); if (el) _spVals[id] = el.value;
  });
  var s = staff.find(function(x){ return x.id === selectedStaffId; });
  if (!s) return;

  var r = rc(s.role);
  var range = getRange();
  var cfg = loadSettings(s.id);
  var shiftList = getShiftsForPeriod(s.id);

  var totalH = 0, totalBrk = 0, daysW = new Set();
  shiftList.forEach(function(x){ totalH += x.wh; totalBrk += x.bm; daysW.add(x.date.toDateString()); });
  totalH = Math.round(totalH*100)/100;
  var daysWorked = daysW.size;

  // ── GROSS CALCULATION ────────────────────────────────────────────────
  var basicSalary  = s.rate > 0 ? Math.round(totalH * s.rate * 100) / 100 : 0;
  var kosttillæg   = parseFloat(cfg.kosttillæg) || 0;
  var drikkepenge  = parseFloat(cfg.drikkepenge) || 0;

  // ── DEDUCTIONS ───────────────────────────────────────────────────────
  var amPct        = parseFloat(cfg.amBidrag) / 100;
  var amBidrag     = Math.round(grossTotal * amPct);
  var amIndkomst   = grossTotal - amBidrag;
  var pensionEget  = Math.round(amIndkomst * (parseFloat(cfg.pension) / 100));
  var pensionFirma = Math.round(amIndkomst * (parseFloat(cfg.pensionFirma) / 100));
  var atp          = (grossTotal > 0 && totalH > 0) ? (parseFloat(cfg.atp) || 99) : 0;

    + 'AM income:         ' + fmtDKKraw(amIndkomst) + ' kr\n'
    + 'Pension eget (' + cfg.pension + '%):   ' + fmtDKKraw(pensionEget) + ' kr\n'
    + 'ATP:                 ' + fmtDKKraw(atp) + ' kr\n'

    + '---\n'
    + 'NET PAYMENT:      ' + fmtDKKraw(netUdbetalt) + ' kr\n\n'

  window.location.href = 'mailto:' + email + '?subject=' + encodeURIComponent('Payslip ' + s.name + ' — ' + range.label) + '&body=' + encodeURIComponent(body);

var _custId = null;

async function plyWait(){
  // Already ready?
  if(window.fbReady===true && typeof window.fbGetCustomers==='function') return true;
  if(window.fbReady===false) return false;
  // Wait for fbReady event OR poll for up to 20s
  return new Promise(function(resolve){
    var done = false;
    function finish(ok){ if(!done){ done=true; clearTimeout(timer); window.removeEventListener('fbReady',onReady); resolve(ok); } }
    function onReady(){ finish(window.fbReady===true && typeof window.fbGetCustomers==='function'); }
    window.addEventListener('fbReady', onReady);
    var timer = setTimeout(function(){
      finish(window.fbReady===true && typeof window.fbGetCustomers==='function');
    }, 8000);
    // Also poll every 100ms in case event already fired
    var poller = setInterval(function(){
      if(window.fbReady===true && typeof window.fbGetCustomers==='function'){ clearInterval(poller); finish(true); }
      else if(window.fbReady===false){ clearInterval(poller); finish(false); }
    }, 100);
  });
}

async function plyHashPw(pw){
  try{var b=new TextEncoder().encode(pw),h=await crypto.subtle.digest('SHA-256',b);
  return Array.from(new Uint8Array(h)).map(function(x){return x.toString(16).padStart(2,'0');}).join('');}
  catch(e){return pw;}
}

async function loadFromFirebase(custId){
  var prefix='cust_'+custId+'_';
  try{
    var s=await window.fbGetData(prefix+'staff');
    var sh=await window.fbGetData(prefix+'shifts');
    var ms=await window.fbGetData(prefix+'monthStore');
    var pi=await window.fbGetData(prefix+'pi');
    var ch=await window.fbGetData(prefix+'clockHistory');
    if(s&&Array.isArray(s)&&s.length) staff=s;
    if(sh){shifts={};Object.keys(sh).forEach(function(k){shifts[parseInt(k)]=sh[k];});}
    if(ms){monthShiftsStore={};Object.keys(ms).forEach(function(k){monthShiftsStore[parseInt(k)]=ms[k];});}
    if(pi){personalInfo={};Object.keys(pi).forEach(function(k){personalInfo[parseInt(k)]=pi[k];});}
    if(ch){clockHistory={};Object.keys(ch).forEach(function(k){clockHistory[parseInt(k)]=ch[k];});}
    return staff.length>0;
  }catch(e){console.error('loadFromFirebase:',e);return false;}
}

async function plyLogin(){
  var email=(document.getElementById('plyEmail').value||'').trim().toLowerCase();
  var pw=document.getElementById('plyPw').value;
  var errEl=document.getElementById('plyErr');
  var btn=document.getElementById('plyBtn');
  errEl.style.display='none';
  if(!email||!pw){errEl.textContent='Please enter email and password.';errEl.style.display='block';return;}
  btn.textContent='Connecting…';btn.disabled=true;

  // Show progress so user knows it hasn't frozen
  var step=0;
  var msgTimer=setInterval(function(){
    step++;
    if(step===1) btn.textContent='Loading…';
    if(step===3) btn.textContent='Still loading…';
    if(step===6) btn.textContent='Taking longer than usual…';
  },2000);

  try{
    var fbOk=await plyWait();
    clearInterval(msgTimer);
    if(!fbOk) {
      if(typeof window.fbGetCustomers==='function') fbOk=true;
      else throw new Error('Cannot connect to server. Check your internet connection and refresh the page.');
    }
    btn.textContent='Signing in…';
    var custs=await window.fbGetCustomers();
    if(!custs||custs.length===0){
      throw new Error('Could not load account data from server. Please refresh the page and try again.');
    }
    var pwHash=await plyHashPw(pw);
    var match=null;
    for(var i=0;i<custs.length;i++){
      var c=custs[i];
      // Match by hashed password (normal) OR plain text (legacy fallback)
      if(c.email&&c.email.toLowerCase()===email&&(c.password===pwHash||c.password===pw)){match=c;break;}
    }
    if(!match) throw new Error('Incorrect email or password. Please try again, or contact your ShiftDesk administrator.');
    if(match.status!=='active') throw new Error('Account not active. Contact your ShiftDesk administrator.');
    if(match.expiryDate&&new Date(match.expiryDate)<new Date()) throw new Error('Subscription expired. Contact your administrator to renew.');
    _custId=match.id;
    await loadFromFirebase(match.id);
    MGR_PASSWORD=match.password||localStorage.getItem(KEYS.mgrPw)||'alex1900';
    try{sessionStorage.setItem('_ply_auth','1');sessionStorage.setItem('_ply_cid',match.id);sessionStorage.setItem('_ply_pw',match.password||'');}catch(ex){}
    plyShowApp();
    if(!staff.length) showEmptyState();
  }catch(err){
    clearInterval(msgTimer);
    var msg = err.message||'Login error. Please try again.';
    errEl.textContent=msg; errEl.style.display='block';
    btn.textContent='Sign in →'; btn.disabled=false;
  }
}

async function initPayroll(){
  populateMonthPicker();
  // If no session at all, hide app content and show only login
  var hasSession = sessionStorage.getItem('_ply_auth')==='1' || sessionStorage.getItem('sd_auth')==='1';
  if(!hasSession){
    // No session - just show login, nothing else
    setTimeout(function(){var el=document.getElementById('plyEmail');if(el)el.focus();},300);
    return;
  }
  // Has session - hide login immediately, show loading state
  var loginEl = document.getElementById('payLogin');
  if(loginEl) loginEl.style.display='none';
  // Try session restore
  try{
    if(sessionStorage.getItem('_ply_auth')==='1'){
      var cid=sessionStorage.getItem('_ply_cid');
      if(cid){
        var fbOk=await plyWait();
        if(fbOk){var loaded=await loadFromFirebase(cid);_custId=cid;
          var spw=sessionStorage.getItem('_ply_pw');if(spw)MGR_PASSWORD=spw;
          if(loaded){plyShowApp();return;}
        }
      }
    }
  }catch(e){}
  // Try ShiftDesk session
  try{
    var sdA=sessionStorage.getItem('sd_auth'),sdC=sessionStorage.getItem('sd_cust_id');
    if(sdA==='1'&&sdC){
      var fbOk2=await plyWait();
      if(fbOk2){
        _custId=sdC;
        // Load customer record to get password for MGR_PASSWORD
        try{
          var custs2=await window.fbGetCustomers();
          var cust2=custs2.find(function(x){return x.id===sdC;});
          if(cust2&&cust2.password) MGR_PASSWORD=cust2.password;
        }catch(e2){}
        var loaded2=await loadFromFirebase(sdC);
        if(loaded2){plyShowApp();return;}
      }
    }
  }catch(e){}
  // Session restore failed — show login form
  var loginEl2=document.getElementById('payLogin');
  if(loginEl2) loginEl2.style.display='flex';
  setTimeout(function(){var el=document.getElementById('plyEmail');if(el)el.focus();},300);
}

document.addEventListener('DOMContentLoaded',function(){initPayroll();});




</script>
