<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>ShiftDesk — Check In/Out</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f5f1;--white:#fff;--border:#e3ddd4;--b2:#c9c3b8;
  --text:#18160f;--muted:#8c8880;--acc:#bf4a0a;--acc-lt:#fdf0e8;
  --green:#1b6e40;--green-lt:#e4f2ec;--red:#c0392b;--red-lt:#fdf0f0;
  --shadow:0 4px 24px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px 16px 40px;}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:16px;margin-top:8px;}
.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--acc);}
.logo-text{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:700;}
.live-time{font-family:'DM Mono',monospace;font-size:.95rem;font-weight:700;color:var(--acc);text-align:center;margin-bottom:20px;}
.card{background:#fff;border:1.5px solid var(--border);border-radius:18px;padding:24px;width:100%;max-width:400px;box-shadow:var(--shadow);}
.card-title{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;margin-bottom:4px;}
.card-sub{font-size:.75rem;color:var(--muted);margin-bottom:20px;}
.lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);display:block;margin-bottom:5px;font-weight:700;}
.inp{width:100%;background:var(--bg);border:1.5px solid var(--b2);color:var(--text);border-radius:10px;padding:13px 14px;font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;transition:border-color .13s;margin-bottom:14px;}
.inp:focus{border-color:var(--acc);background:#fff;}
.btn{width:100%;padding:14px;border-radius:12px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;border:none;transition:all .15s;margin-bottom:8px;}
.btn-primary{background:var(--acc);color:#fff;}
.btn-primary:hover{background:#9d3c07;}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#145530;}
.btn-ghost{background:#fff;border:1.5px solid var(--b2);color:var(--text);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.err{background:var(--red-lt);border:1.5px solid #f5c0c0;color:var(--red);border-radius:10px;padding:10px 14px;font-size:.8rem;margin-bottom:12px;display:none;}
.step{display:none;}
.step.active{display:block;}
.back-btn{background:none;border:none;color:var(--muted);font-size:.8rem;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:16px;padding:4px 0;display:flex;align-items:center;gap:4px;}
.back-btn:hover{color:var(--text);}

/* Status card */
.status-card{border-radius:12px;padding:14px 16px;margin-bottom:16px;}
.status-in{background:var(--green-lt);border:1.5px solid #a8d5bc;}
.status-out{background:#f0ede7;border:1.5px solid var(--border);}
.status-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:4px;}
.status-in .status-label{color:var(--green);}
.status-out .status-label{color:var(--muted);}
.status-time{font-family:'DM Mono',monospace;font-size:1.1rem;font-weight:700;}
.status-in .status-time{color:var(--green);}

/* Shift card */
.shift-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px;}
.shift-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;margin-bottom:4px;}
.shift-time{font-family:'DM Mono',monospace;font-size:.9rem;font-weight:700;color:var(--text);}

/* Success */
.success-card{background:var(--green-lt);border:1.5px solid #a8d5bc;border-radius:14px;padding:24px;text-align:center;margin-bottom:16px;}
.success-icon{font-size:2.5rem;margin-bottom:8px;}
.success-name{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:700;margin-bottom:4px;}
.success-time{font-family:'DM Mono',monospace;font-size:1rem;color:var(--green);margin-bottom:4px;}
.success-worked{font-size:.78rem;color:var(--green);opacity:.8;}

/* GPS badge */
.gps-badge{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;color:#1b4896;background:#e6edf9;border-radius:6px;padding:3px 8px;margin-top:6px;}

/* Loading spinner */
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin:20px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="logo">
  <div class="logo-dot"></div>
  <div class="logo-text">ShiftDesk</div>
</div>
<div class="live-time" id="liveTime"></div>

<div class="card">

  <!-- STEP: No customer ID in URL -->
  <div class="step active" id="stepNoAccess">
    <div style="text-align:center;padding:20px 0;">
      <div style="font-size:2rem;margin-bottom:12px;">🔒</div>
      <div class="card-title" style="text-align:center;margin-bottom:8px;">Ingen adgang</div>
      <div style="font-size:.8rem;color:var(--muted);line-height:1.6;">
        Denne side kræver et direkte link fra din arbejdsgiver.<br><br>
        Bed din leder om at sende dig check-in linket.
      </div>
    </div>
  </div>

  <!-- STEP: Loading -->
  <div class="step" id="stepLoading">
    <div class="spinner"></div>
    <div style="text-align:center;font-size:.8rem;color:var(--muted);">Indlæser...</div>
    <div id="loadErr" class="err" style="margin-top:12px;"></div>
  </div>

  <!-- STEP: Employee login -->
  <div class="step" id="stepLogin">
    <div class="card-title" id="restaurantName">Log ind</div>
    <div class="card-sub">Indtast dit fulde navn og din PIN-kode</div>
    <div id="loginErr" class="err"></div>
    <label class="lbl">Dit fulde navn</label>
    <input class="inp" type="text" id="empName" placeholder="f.eks. Lars Pedersen" autocomplete="name" autocapitalize="words">
    <label class="lbl">PIN-kode (4 cifre)</label>
    <input class="inp" type="password" id="empPin" placeholder="••••" maxlength="4" inputmode="numeric" pattern="[0-9]*">
    <button class="btn btn-primary" onclick="doLogin()">Log ind →</button>
    <div style="font-size:.7rem;color:var(--muted);text-align:center;margin-top:4px;">Første gang? Vælg din egen 4-cifrede PIN</div>
  </div>

  <!-- STEP: Dashboard — check in or out -->
  <div class="step" id="stepDashboard">
    <button class="back-btn" onclick="doLogout()">← Log ud</button>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <div id="dashAv" style="width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:#fff;flex-shrink:0;"></div>
      <div>
        <div id="dashName" style="font-weight:700;font-size:.95rem;"></div>
        <div id="dashRole" style="font-size:.65rem;color:var(--muted);font-family:'DM Mono',monospace;"></div>
      </div>
    </div>
    <div id="dashStatus"></div>
    <div id="dashShift"></div>
    <div id="dashErr" class="err"></div>
    <button class="btn btn-green" id="btnCheckIn" onclick="doCheckIn()">✓ Check Ind</button>
    <button class="btn" id="btnCheckOut" onclick="doCheckOut()" style="background:var(--acc);color:#fff;display:none;">✓ Check Ud</button>
  </div>

  <!-- STEP: Success -->
  <div class="step" id="stepDone">
    <div class="success-card" id="successCard"></div>
    <button class="btn btn-ghost" onclick="backToDash()">← Tilbage</button>
  </div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, getDocs, setDoc, getDoc, doc }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
const cfg={apiKey:"AIzaSyA-LRHC7d0DkjArQBkivoV4EwW5iV5vX6M",authDomain:"shiftdesk-admin.firebaseapp.com",projectId:"shiftdesk-admin",storageBucket:"shiftdesk-admin.firebasestorage.app",messagingSenderId:"942500137972",appId:"1:942500137972:web:c0e0755c97f3590bcb07a1"};
try{
  const app=getApps().length?getApps()[0]:initializeApp(cfg);
  const db=getFirestore(app);
  window.fbGet=async function(key){try{const d=await getDoc(doc(db,'customerData',key));return d.exists()?d.data().value:null;}catch(e){return null;}};
  window.fbSet=async function(key,val){await setDoc(doc(db,'customerData',key),{value:val});};
  window.fbLoadCustomers=async function(){const s=await getDocs(collection(db,'customers'));return s.docs.map(d=>({id:d.id,...d.data()}));};
  window._fbReady=true;
}catch(e){window._fbReady=false;}
</script>

<script>
'use strict';
var custId=null, customer=null, staff=[], loggedInStaff=null;
var clockHistory={}, clockLog={}, shifts={};

// ── Helpers ───────────────────────────────────────────────────────────────
function todayStr(){return new Date().toISOString().slice(0,10);}
function nowHHMM(){var n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function showStep(id){document.querySelectorAll('.step').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}
function showErr(id,msg){var el=document.getElementById(id);el.textContent=msg;el.style.display='block';}
function hideErr(id){document.getElementById(id).style.display='none';}
function ini(n){return n.trim().split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();}
var AV_COLS=['#bf4a0a','#1b6e40','#1b4896','#6b21a8','#b45309','#0e7490'];
function avCol(i){return AV_COLS[i%AV_COLS.length];}
function waitFb(){return new Promise(function(resolve){if(window._fbReady!==undefined){resolve(window._fbReady);return;}var t=0,iv=setInterval(function(){if(window._fbReady!==undefined||++t>50){clearInterval(iv);resolve(!!window._fbReady);}},100);});}
function minsFromHHMM(t){if(!t)return 0;var p=t.split(':').map(Number);return p[0]*60+p[1];}
function fmtDur(mins){if(mins<=0)return '0min';var h=Math.floor(mins/60),m=mins%60;return(h>0?h+'t ':'')+( m>0?m+'min':'');}

// Live clock
(function tick(){var n=new Date();document.getElementById('liveTime').textContent=n.toLocaleTimeString('da-DK',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+' \u00b7 '+n.toLocaleDateString('da-DK',{weekday:'long',day:'numeric',month:'long'});setTimeout(tick,1000);})();

// ── Boot: read ?cust= from URL ────────────────────────────────────────────
async function boot(){
  var params=new URLSearchParams(window.location.search);
  custId=params.get('cust');
  if(!custId){showStep('stepNoAccess');return;}

  showStep('stepLoading');
  var ok=await waitFb();
  if(!ok){showErr('loadErr','Ingen databaseforbindelse.');return;}

  try {
    // Load customer info (just to get the name — don't show to employee)
    var custs=await window.fbLoadCustomers();
    customer=custs.find(function(c){return c.id===custId&&c.status==='active';});
    if(!customer){showErr('loadErr','Ugyldigt eller inaktivt link.');return;}

    // Load staff list
    var s=await window.fbGet('cust_'+custId+'_staff');
    staff=s?(Array.isArray(s)?s:(typeof s==='string'?JSON.parse(s):[])):[];

    // Load clock data
    var ch=await window.fbGet('cust_'+custId+'_clockHistory');
    if(ch){var o=typeof ch==='string'?JSON.parse(ch):ch;Object.keys(o).forEach(function(k){clockHistory[parseInt(k)]=o[k];});}

    var cl=await window.fbGet('cust_'+custId+'_clockLog');
    if(cl){var o2=typeof cl==='string'?JSON.parse(cl):cl;Object.keys(o2).forEach(function(k){clockLog[parseInt(k)]=o2[k];});}

    // Load shifts (to show today's scheduled shift)
    var sh=await window.fbGet('cust_'+custId+'_shifts');
    if(sh){var o3=typeof sh==='string'?JSON.parse(sh):sh;Object.keys(o3).forEach(function(k){shifts[parseInt(k)]=o3[k];});}

    // Show login
    document.getElementById('restaurantName').textContent='Hej! 👋';
    document.getElementById('stepLogin').querySelector('.card-sub').textContent='Log ind på '+customer.name;
    showStep('stepLogin');
    setTimeout(function(){document.getElementById('empName').focus();},200);

  } catch(e){showErr('loadErr','Fejl: '+e.message);}
}

// ── Login: match name against staff list, verify/set PIN ─────────────────
window.doLogin = async function(){
  hideErr('loginErr');
  var name=document.getElementById('empName').value.trim();
  var pin=document.getElementById('empPin').value.trim();

  if(!name){showErr('loginErr','Indtast dit fulde navn.');return;}
  if(pin.length!==4||!/^\d{4}$/.test(pin)){showErr('loginErr','PIN skal være 4 cifre.');return;}

  // Find staff by name (case-insensitive, trim)
  var match=staff.find(function(s){return s.name.trim().toLowerCase()===name.toLowerCase();});
  if(!match){
    showErr('loginErr','Navn ikke fundet. Brug dit fulde navn præcis som registreret (f.eks. "Lars Pedersen").');
    return;
  }

  // Check/set PIN
  var pinKey='cust_'+custId+'_pin_'+match.id;
  var btn=document.querySelector('#stepLogin .btn-primary');
  btn.disabled=true; btn.textContent='Tjekker...';

  try {
    var storedPin=await window.fbGet(pinKey);
    if(!storedPin){
      // First login — save this PIN
      await window.fbSet(pinKey, pin);
    } else if(pin!==storedPin){
      showErr('loginErr','Forkert PIN-kode. Prøv igen.');
      btn.disabled=false; btn.textContent='Log ind →';
      document.getElementById('empPin').value='';
      document.getElementById('empPin').focus();
      return;
    }
    // Logged in
    loggedInStaff=match;
    showDashboard();
  } catch(e){
    showErr('loginErr','Fejl: '+e.message);
  }
  btn.disabled=false; btn.textContent='Log ind →';
};

// ── Dashboard ─────────────────────────────────────────────────────────────
function showDashboard(){
  var s=loggedInStaff;
  var idx=staff.indexOf(s);
  var col=avCol(idx);
  var av=document.getElementById('dashAv');
  av.style.background=col;
  av.textContent=ini(s.name);
  document.getElementById('dashName').textContent=s.name;
  document.getElementById('dashRole').textContent=s.role||'';
  hideErr('dashErr');
  updateDashboard();
  showStep('stepDashboard');
}

function updateDashboard(){
  var sid=loggedInStaff.id;
  var entry=clockLog[sid];
  var isIn=entry&&entry.date===todayStr()&&entry.inTime&&!entry.outTime;
  var isDone=entry&&entry.date===todayStr()&&entry.inTime&&entry.outTime;

  // Status
  var statusHtml='';
  if(isIn){
    statusHtml='<div class="status-card status-in"><div class="status-label">● Tjekket ind</div><div class="status-time">'+entry.inTime+'</div><div style="font-size:.72rem;color:var(--green);margin-top:2px;">Trykker "Check Ud" når du går hjem</div></div>';
  } else if(isDone){
    var worked=minsFromHHMM(entry.outTime)-minsFromHHMM(entry.inTime);
    statusHtml='<div class="status-card status-out"><div class="status-label">✓ Færdig i dag</div><div class="status-time">'+entry.inTime+' – '+entry.outTime+'</div><div style="font-size:.72rem;color:var(--muted);margin-top:2px;">'+fmtDur(worked)+' arbejdet</div></div>';
  } else {
    statusHtml='<div class="status-card status-out"><div class="status-label">Ikke tjekket ind endnu</div><div style="font-size:.78rem;color:var(--muted);margin-top:2px;">Tryk "Check Ind" når du ankommer</div></div>';
  }
  document.getElementById('dashStatus').innerHTML=statusHtml;

  // Today's scheduled shift
  var todayDayIdx=(new Date().getDay()+6)%7;
  var todayShifts=(shifts[sid]||{})[todayDayIdx]||[];
  if(todayShifts.length){
    var shiftStr=todayShifts.map(function(sh){return sh.start+'\u2013'+sh.end+(sh.note?' · '+sh.note:'');}).join(', ');
    document.getElementById('dashShift').innerHTML='<div class="shift-card"><div class="shift-label">Din vagt i dag</div><div class="shift-time">'+shiftStr+'</div></div>';
  } else {
    document.getElementById('dashShift').innerHTML='';
  }

  // Buttons
  document.getElementById('btnCheckIn').style.display=isDone?'none':'block';
  document.getElementById('btnCheckOut').style.display=isIn?'block':'none';
  document.getElementById('btnCheckIn').textContent=isDone?'✓ Tjek ind igen':'✓ Check Ind';
}

// ── GPS helper ────────────────────────────────────────────────────────────
async function getGPS(){
  return new Promise(function(resolve){
    if(!navigator.geolocation){resolve(null);return;}
    navigator.geolocation.getCurrentPosition(
      function(pos){resolve(pos.coords.latitude.toFixed(5)+','+pos.coords.longitude.toFixed(5)+' ('+Math.round(pos.coords.accuracy)+'m)');},
      function(){resolve(null);},
      {timeout:6000,maximumAge:0}
    );
  });
}

// ── Check In ──────────────────────────────────────────────────────────────
window.doCheckIn = async function(){
  var btn=document.getElementById('btnCheckIn');
  btn.disabled=true; btn.textContent='Gemmer...';
  hideErr('dashErr');

  var inT=nowHHMM(), ds=todayStr(), sid=loggedInStaff.id;
  var gps=await getGPS();

  clockLog[sid]={inTime:inT,outTime:null,date:ds,gps:gps};
  if(!clockHistory[sid])clockHistory[sid]={};
  clockHistory[sid][ds]={inTime:inT,outTime:null,approved:false,approvedBy:'',note:'Medarbejder selv',dateStr:ds,gps:gps};

  try{
    await window.fbSet('cust_'+custId+'_clockHistory',clockHistory);
    await window.fbSet('cust_'+custId+'_clockLog',clockLog);
    document.getElementById('successCard').innerHTML=
      '<div class="success-icon">\u2713</div>'
      +'<div class="success-name">'+loggedInStaff.name+'</div>'
      +'<div class="success-time">Tjekket ind kl. '+inT+'</div>'
      +(gps?'<div class="gps-badge">\uD83D\uDCCD GPS registreret</div>':'')
      +'<div class="success-worked" style="margin-top:8px;">God arbejdsdag! \uD83D\uDC4B</div>';
    showStep('stepDone');
  }catch(e){
    showErr('dashErr','Fejl: '+e.message);
    btn.disabled=false; btn.textContent='✓ Check Ind';
  }
};

// ── Check Out ─────────────────────────────────────────────────────────────
window.doCheckOut = async function(){
  var btn=document.getElementById('btnCheckOut');
  btn.disabled=true; btn.textContent='Gemmer...';
  hideErr('dashErr');

  var outT=nowHHMM(), ds=todayStr(), sid=loggedInStaff.id;
  var inT=(clockLog[sid]&&clockLog[sid].inTime)||'?';
  var gps=await getGPS();

  if(clockLog[sid]){clockLog[sid].outTime=outT;if(gps)clockLog[sid].gpsOut=gps;}
  if(clockHistory[sid]&&clockHistory[sid][ds]){
    clockHistory[sid][ds].outTime=outT;
    if(gps)clockHistory[sid][ds].gpsOut=gps;
  }

  var worked=minsFromHHMM(outT)-minsFromHHMM(inT);

  try{
    await window.fbSet('cust_'+custId+'_clockHistory',clockHistory);
    await window.fbSet('cust_'+custId+'_clockLog',clockLog);
    document.getElementById('successCard').innerHTML=
      '<div class="success-icon">\uD83C\uDFE0</div>'
      +'<div class="success-name">'+loggedInStaff.name+'</div>'
      +'<div class="success-time">Tjekket ud kl. '+outT+'</div>'
      +(gps?'<div class="gps-badge">\uD83D\uDCCD GPS registreret</div>':'')
      +'<div class="success-worked" style="margin-top:8px;">Arbejdet: '+fmtDur(worked)+' \u00b7 Tak for i dag! \uD83D\uDC4F</div>';
    showStep('stepDone');
  }catch(e){
    showErr('dashErr','Fejl: '+e.message);
    btn.disabled=false; btn.textContent='✓ Check Ud';
  }
};

// ── Navigation ────────────────────────────────────────────────────────────
window.backToDash = function(){ updateDashboard(); showStep('stepDashboard'); };
window.doLogout   = function(){ loggedInStaff=null; document.getElementById('empName').value=''; document.getElementById('empPin').value=''; showStep('stepLogin'); };

// ── Boot ──────────────────────────────────────────────────────────────────
boot();
</script>
</body>
</html>
