<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ShiftDesk — Fix Customer</title>
<style>
body{font-family:sans-serif;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
.box{background:#fff;border-radius:16px;padding:36px 32px;width:440px;box-shadow:0 8px 40px rgba(0,0,0,.12);}
h2{margin:0 0 6px;font-size:1.2rem;}
p{color:#666;font-size:.85rem;margin:0 0 20px;line-height:1.5;}
label{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:4px;}
input{width:100%;box-sizing:border-box;border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:.9rem;font-family:monospace;margin-bottom:14px;outline:none;}
input:focus{border-color:#1b6e40;}
button{width:100%;background:#1b6e40;color:#fff;border:none;border-radius:10px;padding:13px;font-size:.95rem;font-weight:700;cursor:pointer;margin-bottom:10px;}
button:disabled{opacity:.5;cursor:not-allowed;}
#log{font-size:.8rem;line-height:1.9;min-height:20px;}
.ok{color:#1b6e40;font-weight:700;}
.err{color:#c0392b;font-weight:700;}
.info{color:#555;}
</style>
</head>
<body>
<div class="box">
  <h2>🔧 Fix Customer Email</h2>
  <p>This tool finds your customer in Firebase and writes the correct email so login works. Run it once, then delete it.</p>

  <label>Customer Email to set</label>
  <input type="email" id="inEmail" value="hallo@gmail.com">

  <label>New Password (min 8 chars) — leave blank to keep existing</label>
  <input type="password" id="inPw" placeholder="Leave blank to keep current password">

  <button id="runBtn" onclick="run()">Fix Customer in Firebase →</button>
  <div id="log"></div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const cfg = {
  apiKey: "AIzaSyA-LRHC7d0DkjArQBkivoV4EwW5iV5vX6M",
  authDomain: "shiftdesk-admin.firebaseapp.com",
  projectId: "shiftdesk-admin",
  storageBucket: "shiftdesk-admin.firebasestorage.app",
  messagingSenderId: "942500137972",
  appId: "1:942500137972:web:c0e0755c97f3590bcb07a1"
};

async function hashPw(pw) {
  var buf = new TextEncoder().encode(pw);
  var h = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2,'0')).join('');
}

window.run = async function() {
  var email = document.getElementById('inEmail').value.trim().toLowerCase();
  var pw    = document.getElementById('inPw').value;
  var log   = document.getElementById('log');
  var btn   = document.getElementById('runBtn');

  if (!email) { log.innerHTML = '<span class="err">Enter an email address.</span>'; return; }
  btn.disabled = true;
  log.innerHTML = '<span class="info">Connecting to Firebase…</span>';

  try {
    const app = getApps().length ? getApps()[0] : initializeApp(cfg);
    const db  = getFirestore(app);
    log.innerHTML += '<br><span class="info">Loading customers…</span>';

    const snap = await getDocs(collection(db, "customers"));
    log.innerHTML += '<br><span class="info">Found ' + snap.docs.length + ' customer(s)</span>';

    if (snap.docs.length === 0) {
      // No customers at all — create a fresh one
      log.innerHTML += '<br><span class="info">No customers found — creating new account…</span>';
      if (!pw || pw.length < 8) {
        log.innerHTML += '<br><span class="err">No existing customer found. Please enter a password (min 8 chars) to create one.</span>';
        btn.disabled = false; return;
      }
      var pwHash = await hashPw(pw);
      var newId = 'cust_' + Date.now();
      var newCust = {
        id: newId, name: 'hallo', contact: 'hallo',
        email: email, password: pwHash,
        plan: 'starter', duration: '1',
        startDate: new Date().toISOString().split('T')[0],
        expiryDate: new Date(Date.now() + 365*24*60*60*1000).toISOString().split('T')[0],
        status: 'active', hasPayroll: true, hasBudget: true,
        createdAt: new Date().toISOString()
      };
      await setDoc(doc(db, "customers", newId), newCust);
      log.innerHTML += '<br><span class="ok">✓ New customer created with email: ' + email + '</span>';
      log.innerHTML += '<br><span class="ok">✓ Customer ID: ' + newId + '</span>';
      log.innerHTML += '<br><br><strong>Done! Now log in to payroll/loen.html with:<br>Email: ' + email + '<br>Password: the one you just set</strong>';
    } else {
      // Update ALL existing customers — set email on any that are missing it
      var fixed = 0;
      for (var d of snap.docs) {
        var data = d.data();
        var updated = Object.assign({}, data);
        var changed = false;

        // Set email if missing or wrong
        if (!data.email || data.email !== email) {
          updated.email = email;
          changed = true;
          log.innerHTML += '<br><span class="info">Setting email on customer: ' + d.id + '</span>';
        }

        // Update password if provided
        if (pw && pw.length >= 8) {
          var pwHash = await hashPw(pw);
          updated.password = pwHash;
          changed = true;
          log.innerHTML += '<br><span class="info">Updating password on: ' + d.id + '</span>';
        }

        // Make sure status is active
        if (data.status !== 'active') {
          updated.status = 'active';
          changed = true;
        }

        // Make sure hasPayroll is true
        if (!data.hasPayroll) {
          updated.hasPayroll = true;
          changed = true;
        }

        if (changed) {
          await setDoc(doc(db, "customers", d.id), updated);
          fixed++;
          log.innerHTML += '<br><span class="ok">✓ Fixed customer: ' + d.id + ' → email: ' + email + '</span>';
        } else {
          log.innerHTML += '<br><span class="ok">✓ Customer ' + d.id + ' already has email: ' + data.email + ' (no change needed)</span>';
        }
      }

      log.innerHTML += '<br><br><strong style="color:#1b6e40">✅ Done! Fixed ' + fixed + ' customer(s).</strong>';
      log.innerHTML += '<br><span class="info">Now go to <strong>payroll.html</strong> or <strong>loen.html</strong> and log in with:<br>Email: <strong>' + email + '</strong><br>Password: ' + (pw ? 'the one you just set' : 'your existing password') + '</span>';
    }
  } catch(e) {
    log.innerHTML += '<br><span class="err">Error: ' + e.message + '</span>';
    btn.disabled = false;
  }
};
</script>
</body>
</html>
